    <h1>Math(ℯ)'M𝒾ss𝒾ons</h1>

        <section class="mission">
            <h2>Test1</h2>

            <div class="question">

                <h3>Question 1</h3>
            
                <p>
                    On considère la fonction. Trouver une formule explicite.
                </p>
            
                \[
                    f(x)=\int_0^x t\cos(t)\,dt
                \]
            
                <button class="solution-btn">
                    Voir la correction
                </button>
            
                <div class="solution">
            
                    <p>
                        Solution:
                    </p>
            
                    \[
                        f(x)=x\sin(x)+\cos(x)-1
                    \]
            
                </div>
            
            </div>
